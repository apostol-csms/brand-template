# Apostol CSMS — brand deployment compose (Phase 10 zero-build).
#
# Pure-image deployment: every platform component is pulled from GHCR
# and pinned by digest in envs/<env>/platform.lock.json → PLATFORM_VERSION
# in workdir/.env.  The brand side never builds platform code; only
# infra (nginx/pgbouncer/pgweb) and the brand-specific landing site are
# built locally.
#
# Usage:
#   docker compose --env-file workdir/.env pull
#   docker compose --env-file workdir/.env up -d
#
# Or install.sh / update.sh handle the orchestration end-to-end.
#
# Conventions:
#   - Platform: backend, ocpp, db-init/db-migrate, frontend, driver, pay,
#     auth → image: ghcr.io/apostol-csms/csms-*:${PLATFORM_VERSION}.
#   - csms-db image ships encrypted SQL (Phase 4c) — runtime decryption
#     via license envelope's db_key_wrapped, no source code on the brand
#     side.
#   - SPA images are brand-agnostic — runtime brand identity comes from
#     the license attestation chain (Phase 6/7/8/9).
#   - Landing is brand-specific (per <brand>/landing repo) — `build:`.
#   - Infra (nginx, pgbouncer, pgweb): bundled .docker/ Dockerfiles.
#     Brand-specific chunks live under .docker/ too — operator may
#     customize without touching this compose.

name: '${PROJECT_NAME:-csms}'

# ─── SPA healthcheck (shared via YAML anchor) ─────────────────
#
# All five SPA apps (landing/frontend/driver/pay/auth) listen :3000
# inside the container. Without a healthcheck Docker reports the
# container "started" the moment the first process forks — before
# Next.js / Nuxt finish bootstrapping — and nginx (which waits on
# service_healthy) may route to a container that isn't listening
# yet, or worse to an IP just reassigned from a sibling. That's
# the root cause of bare ${DOMAIN} serving auth SPA after
# update.sh's rolling-recreate. Paired with update.sh's two-phase
# rolling_restart this keeps deploys race-free.
#
# Probe: TCP-listen check via busybox `netstat`. Not an HTTP probe
# on purpose:
#   - Next.js standalone's `node server.js` binds to $HOSTNAME (the
#     container name → the docker-bridge IP), NOT 127.0.0.1 or
#     0.0.0.0, so `wget http://127.0.0.1:3000/` fails.
#   - Next.js `/` does a locale redirect whose Location is not
#     resolvable by busybox wget's --spider.
# TCP-listen catches the real race we care about (process forked
# but not yet accepting connections). Semantic HTTP checks live in
# check.sh, probing from outside via public URLs.
x-spa-healthcheck: &spa-healthcheck
  test: ["CMD-SHELL", "netstat -tln 2>/dev/null | grep -q ':3000 ' || exit 1"]
  interval: 5s
  timeout: 3s
  retries: 24
  start_period: 20s

# ─── Infrastructure ───────────────────────────────────────────

services:

  nginx:
    build: ./.docker/nginx-certbot
    container_name: nginx
    hostname: ${DOMAIN:-localhost}
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    networks:
      wan-network:
      lan-network:
        aliases:
          - dev.${DOMAIN:-localhost}
          - cloud.${DOMAIN:-localhost}
          - cpo.${DOMAIN:-localhost}
          - cs.${DOMAIN:-localhost}
          - driver.${DOMAIN:-localhost}
          - admin.${DOMAIN:-localhost}
          - landing.${DOMAIN:-localhost}
          - ocpp.${DOMAIN:-localhost}
          - auth.${DOMAIN:-localhost}
          - pay.${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    # Wait for each SPA to pass its HTTP healthcheck before nginx is
    # allowed to route traffic. Prevents bare-domain ↔ auth confusion
    # after rolling restart (see x-spa-healthcheck comment above).
    # backend/ocpp don't ship healthchecks yet → service_started.
    depends_on:
      backend:  { condition: service_started }
      ocpp:     { condition: service_started }
      landing:  { condition: service_healthy }
      frontend: { condition: service_healthy }
      driver:   { condition: service_healthy }
      pay:      { condition: service_healthy }
      auth:     { condition: service_healthy }
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt

  wireguard:
    build: ./.docker/wireguard
    container_name: wireguard
    profiles: ["vpn"]
    environment:
      - PUID=1000
      - PGID=1000
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.conf.all.proxy_arp=1
    ports:
      - "51828:51828/udp"
    networks:
      - wan-network
      - lan-network
      - db-network
    volumes:
      - /lib/modules:/lib/modules:ro
    restart: unless-stopped

  # ─── Database ─────────────────────────────────────────────

  postgres:
    image: postgres:18
    container_name: postgres
    cap_add:
      - NET_ADMIN
    networks:
      - db-network
    ports:
      - "5431:5432"
    restart: unless-stopped
    # Tuning passed as `-c` flags so we keep the vanilla postgres:18
    # image (zero-build, Phase 10).  Mirrors the reference profile in
    # `.docker/postgres/postgresql.conf` (kept in the repo as the
    # canonical pgtune-style baseline — see https://pgtune.leopard.in.ua).
    #
    # Why max_connections=200: with WORKER_PROCESSES=8 the backend pool
    # holds ~64 apibot + ~31 daemon slots permanently, leaving no room
    # for kernel (db-migrate) or one-off admin queries.  200 leaves
    # headroom; at ~10 MB per idle slot this is well within reach on a
    # 4+ GB host.  Revisit if WORKER_PROCESSES is tuned above 16.
    #
    # `search_path` is set per-database via ALTER DATABASE in the
    # csms-db image's compose-env.sh — not here — so the value lives
    # next to the project.* GUCs and survives DB-level migrations.
    command:
      - "postgres"
      # search_path: Apostol CRM expects "kernel, public" first.
      # `$$user` is escaped from docker-compose's $-interpolation so
      # postgres receives the literal "$user" identifier (which it then
      # resolves to the connecting role's name at session start).
      - "-c"
      - 'search_path="$$user", kernel, public'
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=1310kB"
      - "-c"
      - "huge_pages=off"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
    env_file:
      - ./workdir/.env
    environment:
      POSTGRES_DB: ${PGDATABASE:-csms}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BUILD_ENV: ${BUILD_ENV:-dev}
    volumes:
      # postgres:18+ requires the volume at /var/lib/postgresql (not /data)
      # so that pg_ctlcluster's major-version subdirectories sit inside
      # the mount. See docker-library/postgres#1259.
      - postgresql:/var/lib/postgresql
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres']
      interval: 10s
      timeout: 5s
      retries: 3

  pgbouncer:
    build: ./.docker/pgbouncer
    container_name: pgbouncer
    networks:
      - db-network
    restart: unless-stopped
    # No userlist.txt bind-mount — pgbouncer's docker-entrypoint.sh
    # regenerates it in-container from pg_authid on every start
    # (SCRAM-SHA-256 hashes for postgres:18 runtime roles).  Bind-
    # mounting a host file made the in-place rewrite fail (Resource busy
    # for `mv`, Permission denied for `cat >` due to UID mismatch).
    # The image's writable layer holds the regenerated file fine.
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./workdir/.env
    environment:
      DB_NAME: ${PGDATABASE:-csms}
    healthcheck:
      # Explicit -U to avoid "no such user: postgres" log spam —
      # pg_isready defaults to the `postgres` OS user which isn't in
      # pgbouncer's userlist. kernel is always present.
      test: ['CMD', 'pg_isready', '-h', 'pgbouncer', '-p', '6432', '-U', 'kernel']
      interval: 10s
      timeout: 5s
      retries: 3

  pgweb:
    build: ./.docker/pgweb
    container_name: pgweb
    restart: unless-stopped
    networks:
      - lan-network
      - db-network
    environment:
      PGWEB_DATABASE_URL: "postgres://admin:${DB_PASS_ADMIN}@postgres:5432/${PGDATABASE:-csms}?sslmode=disable"
      PGWEB_URL_PREFIX: pgweb
      PGWEB_AUTH_USER: admin
      PGWEB_AUTH_PASS: ${DB_PASS_ADMIN}
    depends_on:
      postgres:
        condition: service_healthy

  # ─── DB init + migrate (same image, different entrypoints) ──
  #
  # Phase 10 — csms-db ships as a public GHCR image with the encrypted
  # SQL configuration baked in (CI build-arg CSMS_DB_KEY → AES-CTR
  # tarball).  Brand side never sees the SQL sources; init.sh decrypts
  # at runtime via license envelope's db_key_wrapped (Phase 4c).

  db-init:
    image: ghcr.io/apostol-csms/csms-db:${PLATFORM_VERSION:-latest}
    container_name: db-init
    entrypoint: ["/opt/csms-db/docker/init.sh"]
    networks:
      - db-network
    env_file:
      - ./workdir/.env
    volumes:
      # csms-secrets persistent volume — entrypoint-secrets.sh writes
      # passwords.psql / oauth2.psql / install.pgpass / db.pgpass here
      # on first install (idempotent across restarts).  In image-mode
      # compose-env.sh composes $SQL_DIR/.env/.env.psql by \ir-ing those
      # files alongside project.* GUCs derived from license.json.
      - csms-secrets:/var/lib/csms/secrets
      # License envelope — Phase 4c db_key_wrapped → CSMS_DB_KEY via
      # extract-db-key.sh; Phase 2d payload.brand → project.* GUCs via
      # compose-env.sh.  pre-install hook copies it from .secrets/.
      - ./conf/license.json:/etc/csms/conf/license.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  db-migrate:
    image: ghcr.io/apostol-csms/csms-db:${PLATFORM_VERSION:-latest}
    container_name: db-migrate
    entrypoint: ["/opt/csms-db/docker/migrate.sh"]
    networks:
      - db-network
    env_file:
      - ./workdir/.env
    environment:
      # migrate.sh reads PGPASSWORD (or KERNEL_PASSWORD) for the `kernel`
      # role. env_file gives us DB_PASS_KERNEL but that name is not in
      # migrate.sh's fallback chain — without this explicit mapping the
      # guard `SELECT 1 FROM pg_database` fails with "no password
      # supplied" and the script misleadingly logs `database
      # '<PGDATABASE>' does not exist — db-init should run first`.
      # Mirrors the pattern backend/ocpp already use for DB_PASS_DAEMON.
      PGPASSWORD: ${DB_PASS_KERNEL}
    volumes:
      # Same csms-secrets + license.json as db-init.
      - csms-secrets:/var/lib/csms/secrets
      - ./conf/license.json:/etc/csms/conf/license.json:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: "no"

  # ─── Platform services (pulled from GHCR) ───────────────────

  backend:
    image: ghcr.io/apostol-csms/csms-backend:${PLATFORM_VERSION:-latest}
    container_name: backend
    networks:
      - lan-network
      - db-network
    restart: unless-stopped
    env_file:
      - ./workdir/.env
    environment:
      # Legacy libpq/app name compatibility (brand SSOT uses new naming).
      PGPASSWORD: ${DB_PASS_DAEMON}
      PGPASSWORDAPI: ${DB_PASS_APIBOT}
      CLIENT_SECRET_SERVICE: ${OAUTH2_SECRET_SERVICE}
      CLIENT_SECRET_WEB: ${OAUTH2_SECRET_WEB}
      CLIENT_SECRET_ANDROID: ${OAUTH2_SECRET_ANDROID}
      CLIENT_SECRET_IOS: ${OAUTH2_SECRET_IOS}
      WORKER_PROCESSES: ${WORKER_PROCESSES:-8}
      PGSSLCERT: /tmp/postgresql.crt
      PGHOST: pgbouncer
      PGPORT: 6432
      PGUSER: daemon
      PGHOSTAPI: postgres
      PGPORTAPI: 5432
      PGUSERAPI: apibot
    volumes:
      - tmp:/tmp/csms
      - files:/etc/csms/files
      # License envelope — read by both process-LicenseServer (Phase 3a)
      # and module-LicenseServer (Phase 3b) at boot + on mtime change.
      - ./conf/license.json:/etc/csms/conf/license.json:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_started

  ocpp:
    image: ghcr.io/apostol-csms/csms-ocpp:${PLATFORM_VERSION:-latest}
    container_name: ocpp
    networks:
      - lan-network
      - db-network
    ports:
      - "9220:9220"
    restart: unless-stopped
    env_file:
      - ./workdir/.env
    environment:
      PGPASSWORD: ${DB_PASS_OCPP}
      PGPASSWORDAPI: ${DB_PASS_APIBOT}
      CLIENT_SECRET_SERVICE: ${OAUTH2_SECRET_SERVICE}
      CLIENT_SECRET_WEB: ${OAUTH2_SECRET_WEB}
      CLIENT_SECRET_ANDROID: ${OAUTH2_SECRET_ANDROID}
      CLIENT_SECRET_IOS: ${OAUTH2_SECRET_IOS}
      CLIENT_SECRET_OCPP: ${OAUTH2_SECRET_OCPP}
      PGSSLCERT: /tmp/postgresql.crt
      PGHOST: pgbouncer
      PGPORT: 6432
      PGUSER: ocpp
      PGHOSTAPI: postgres
      PGPORTAPI: 5432
      PGUSERAPI: apibot
      API_HOST: cloud.${DOMAIN:-localhost}
      OCPP_HOST: cs.${DOMAIN:-localhost}
    depends_on:
      - backend

  # ─── Frontend apps (Phase 10 — pulled from GHCR) ─────────────
  #
  # All four SPA images (csms-webapp, csms-driver, csms-pay, csms-auth)
  # are brand-agnostic: brand identity (logo, name, theme, OAuth2
  # client_id / scope) is delivered at runtime via the license-driven
  # attestation chain (Phase 6/7/8/9 — main.ts loads
  # /platform-pubkey.pem + fetches /api/v1/session/init).  No build-args
  # are baked into the image any more.
  #
  # Map keys (Google Maps / Stadia / Yandex) and Stripe publishable key
  # are still build-time inlined and currently default to empty in CI
  # builds — those features will degrade gracefully (no map, no Stripe
  # Payment Element) until Phase 11+ extends /session/init to ship them
  # at runtime.  Brands needing them today must build their own private
  # fork of csms-{webapp,driver,pay} via their own CI.
  #
  # `landing` is brand-specific (per-brand <brand>/landing repo, e.g.
  # ocpp-css/landing) — kept as `build:` here.  Comment-out + uncomment
  # the service to match what your brand has bootstrapped.

  landing:
    build:
      context: ./workdir/frontend/landing
      dockerfile: .docker/Dockerfile
    container_name: landing
    networks:
      - lan-network
    env_file:
      - ./workdir/frontend/landing/src/.env
    healthcheck: *spa-healthcheck

  frontend:
    image: ghcr.io/apostol-csms/csms-webapp:${PLATFORM_VERSION:-latest}
    container_name: frontend
    env_file:
      - ./workdir/.env
    networks:
      - lan-network
    healthcheck: *spa-healthcheck

  driver:
    image: ghcr.io/apostol-csms/csms-driver:${PLATFORM_VERSION:-latest}
    container_name: driver
    env_file:
      - ./workdir/.env
    networks:
      - lan-network
    restart: unless-stopped
    healthcheck: *spa-healthcheck

  pay:
    image: ghcr.io/apostol-csms/csms-pay:${PLATFORM_VERSION:-latest}
    container_name: pay
    env_file:
      - ./workdir/.env
    networks:
      - lan-network
    healthcheck: *spa-healthcheck

  auth:
    image: ghcr.io/apostol-csms/csms-auth:${PLATFORM_VERSION:-latest}
    container_name: auth
    env_file:
      - ./workdir/.env
    networks:
      - lan-network
    restart: unless-stopped
    healthcheck: *spa-healthcheck

  # ─── Optional ───────────────────────────────────────────────

  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: stripe-cli
    networks:
      - lan-network
    command: ["listen", "--api-key", "${STRIPE_API_KEY}", "--device-name", "${PROJECT_NAME:-csms}-${BUILD_ENV:-dev}", "--skip-update", "--forward-to", "http://backend:4977/stripe/webhook"]
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - stripe

networks:
  wan-network:
  lan-network:
  db-network:

volumes:
  letsencrypt:
  postgresql:
  files:
  tmp:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=100m
