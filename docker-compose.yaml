# Apostol CSMS — brand deployment compose.
#
# Image-based deployment: platform binaries pulled from GHCR, database
# layer + frontend sources built locally on the brand side. All paths
# under ./workdir/ are populated by install.sh before `docker compose up`.
#
# Usage:
#   docker compose --env-file workdir/.env build
#   docker compose --env-file workdir/.env up -d
#
# Or install.sh handles the orchestration end-to-end.
#
# Conventions:
#   - Platform components (backend, ocpp): image: from GHCR, pinned in
#     platform.lock.json → PLATFORM_VERSION in workdir/.env.
#   - Database image (csms-db): built locally from workdir/db at first
#     install; tagged local/csms-db:${PLATFORM_VERSION}. db-init and
#     db-migrate share the image but differ by entrypoint.
#   - Frontend apps: built locally from workdir/frontend/<app>.
#   - Infra (nginx, pgbouncer, pgweb): bundled .docker/ Dockerfiles.
#     Brand-specific chunks live under .docker/ too — operator may
#     customize without touching this compose.

name: '${PROJECT_NAME:-csms}'

# ─── SPA healthcheck (shared via YAML anchor) ─────────────────
#
# All five SPA apps (landing/frontend/driver/pay/auth) listen :3000
# inside the container. Without a healthcheck Docker reports the
# container "started" the moment the first process forks — before
# Next.js / Nuxt finish bootstrapping — and nginx (which waits on
# service_healthy) may route to a container that isn't listening
# yet, or worse to an IP just reassigned from a sibling. That's
# the root cause of bare ${DOMAIN} serving auth SPA after
# update.sh's rolling-recreate. Paired with update.sh's two-phase
# rolling_restart this keeps deploys race-free.
#
# Probe: TCP-listen check via busybox `netstat`. Not an HTTP probe
# on purpose:
#   - Next.js standalone's `node server.js` binds to $HOSTNAME (the
#     container name → the docker-bridge IP), NOT 127.0.0.1 or
#     0.0.0.0, so `wget http://127.0.0.1:3000/` fails.
#   - Next.js `/` does a locale redirect whose Location is not
#     resolvable by busybox wget's --spider.
# TCP-listen catches the real race we care about (process forked
# but not yet accepting connections). Semantic HTTP checks live in
# check.sh, probing from outside via public URLs.
x-spa-healthcheck: &spa-healthcheck
  test: ["CMD-SHELL", "netstat -tln 2>/dev/null | grep -q ':3000 ' || exit 1"]
  interval: 5s
  timeout: 3s
  retries: 24
  start_period: 20s

# ─── Infrastructure ───────────────────────────────────────────

services:

  nginx:
    build: ./.docker/nginx-certbot
    container_name: nginx
    hostname: ${DOMAIN:-localhost}
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    networks:
      wan-network:
      lan-network:
        aliases:
          - dev.${DOMAIN:-localhost}
          - cloud.${DOMAIN:-localhost}
          - cpo.${DOMAIN:-localhost}
          - cs.${DOMAIN:-localhost}
          - driver.${DOMAIN:-localhost}
          - admin.${DOMAIN:-localhost}
          - landing.${DOMAIN:-localhost}
          - ocpp.${DOMAIN:-localhost}
          - auth.${DOMAIN:-localhost}
          - pay.${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    # Wait for each SPA to pass its HTTP healthcheck before nginx is
    # allowed to route traffic. Prevents bare-domain ↔ auth confusion
    # after rolling restart (see x-spa-healthcheck comment above).
    # backend/ocpp don't ship healthchecks yet → service_started.
    depends_on:
      backend:  { condition: service_started }
      ocpp:     { condition: service_started }
      landing:  { condition: service_healthy }
      frontend: { condition: service_healthy }
      driver:   { condition: service_healthy }
      pay:      { condition: service_healthy }
      auth:     { condition: service_healthy }
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt

  wireguard:
    build: ./.docker/wireguard
    container_name: wireguard
    profiles: ["vpn"]
    environment:
      - PUID=1000
      - PGID=1000
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.conf.all.proxy_arp=1
    ports:
      - "51828:51828/udp"
    networks:
      - wan-network
      - lan-network
      - db-network
    volumes:
      - /lib/modules:/lib/modules:ro
    restart: unless-stopped

  # ─── Database ─────────────────────────────────────────────

  postgres:
    image: postgres:18
    container_name: postgres
    cap_add:
      - NET_ADMIN
    networks:
      - db-network
    ports:
      - "5431:5432"
    restart: unless-stopped
    # Minimal sane default: max_connections=200.
    # Why 200: with WORKER_PROCESSES=8 the backend pool sits at
    # ~64 apibot + ~31 daemon slots permanently, leaving no room
    # for kernel (db-migrate during `update.sh`) or one-off admin
    # queries. 200 leaves headroom; at ~10 MB per idle slot this
    # is well within reach on a 4+ GB host. Revisit if
    # WORKER_PROCESSES is tuned above 16.
    #
    # For anything beyond max_connections (shared_buffers,
    # effective_cache_size, work_mem, …) drop a tuned
    # postgresql.conf into .docker/postgres/postgresql.conf and
    # replace this command + add the mount:
    #   command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    #   volumes:
    #     - ./.docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    # See https://pgtune.leopard.in.ua for a starting point.
    command: ["postgres", "-c", "max_connections=200"]
    env_file:
      - ./workdir/.env
    environment:
      POSTGRES_DB: ${PGDATABASE:-csms}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BUILD_ENV: ${BUILD_ENV:-dev}
    volumes:
      # postgres:18+ requires the volume at /var/lib/postgresql (not /data)
      # so that pg_ctlcluster's major-version subdirectories sit inside
      # the mount. See docker-library/postgres#1259.
      - postgresql:/var/lib/postgresql
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres']
      interval: 10s
      timeout: 5s
      retries: 3

  pgbouncer:
    build: ./.docker/pgbouncer
    container_name: pgbouncer
    networks:
      - db-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./workdir/.env
    environment:
      DB_NAME: ${PGDATABASE:-csms}
    healthcheck:
      # Explicit -U to avoid "no such user: postgres" log spam —
      # pg_isready defaults to the `postgres` OS user which isn't in
      # pgbouncer's userlist. kernel is always present.
      test: ['CMD', 'pg_isready', '-h', 'pgbouncer', '-p', '6432', '-U', 'kernel']
      interval: 10s
      timeout: 5s
      retries: 3

  pgweb:
    build: ./.docker/pgweb
    container_name: pgweb
    restart: unless-stopped
    networks:
      - lan-network
      - db-network
    environment:
      PGWEB_DATABASE_URL: "postgres://admin:${DB_PASS_ADMIN}@postgres:5432/${PGDATABASE:-csms}?sslmode=disable"
      PGWEB_URL_PREFIX: pgweb
      PGWEB_AUTH_USER: admin
      PGWEB_AUTH_PASS: ${DB_PASS_ADMIN}
    depends_on:
      postgres:
        condition: service_healthy

  # ─── DB init + migrate (same image, different entrypoints) ──

  db-init:
    build:
      context: ./workdir/db
      args:
        PLATFORM_VERSION: ${PLATFORM_VERSION:-dev}
    image: local/csms-db:${PLATFORM_VERSION:-dev}
    container_name: db-init
    entrypoint: ["/opt/csms-db/docker/init.sh"]
    networks:
      - db-network
    env_file:
      - ./workdir/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  db-migrate:
    image: local/csms-db:${PLATFORM_VERSION:-dev}
    container_name: db-migrate
    entrypoint: ["/opt/csms-db/docker/migrate.sh"]
    networks:
      - db-network
    env_file:
      - ./workdir/.env
    environment:
      # migrate.sh reads PGPASSWORD (or KERNEL_PASSWORD) for the `kernel`
      # role. env_file gives us DB_PASS_KERNEL but that name is not in
      # migrate.sh's fallback chain — without this explicit mapping the
      # guard `SELECT 1 FROM pg_database` fails with "no password
      # supplied" and the script misleadingly logs `database
      # '<PGDATABASE>' does not exist — db-init should run first`.
      # Mirrors the pattern backend/ocpp already use for DB_PASS_DAEMON.
      PGPASSWORD: ${DB_PASS_KERNEL}
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: "no"

  # ─── Platform services (pulled from GHCR) ───────────────────

  backend:
    image: ghcr.io/apostol-csms/csms-backend:${PLATFORM_VERSION:-latest}
    container_name: backend
    networks:
      - lan-network
      - db-network
    restart: unless-stopped
    env_file:
      - ./workdir/.env
    environment:
      # Legacy libpq/app name compatibility (brand SSOT uses new naming).
      PGPASSWORD: ${DB_PASS_DAEMON}
      PGPASSWORDAPI: ${DB_PASS_APIBOT}
      CLIENT_SECRET_SERVICE: ${OAUTH2_SECRET_SERVICE}
      CLIENT_SECRET_WEB: ${OAUTH2_SECRET_WEB}
      CLIENT_SECRET_ANDROID: ${OAUTH2_SECRET_ANDROID}
      CLIENT_SECRET_IOS: ${OAUTH2_SECRET_IOS}
      WORKER_PROCESSES: ${WORKER_PROCESSES:-8}
      PGSSLCERT: /tmp/postgresql.crt
      PGHOST: pgbouncer
      PGPORT: 6432
      PGUSER: daemon
      PGHOSTAPI: postgres
      PGPORTAPI: 5432
      PGUSERAPI: apibot
    volumes:
      - tmp:/tmp/csms
      - files:/etc/csms/files
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_started

  ocpp:
    image: ghcr.io/apostol-csms/csms-ocpp:${PLATFORM_VERSION:-latest}
    container_name: ocpp
    networks:
      - lan-network
      - db-network
    ports:
      - "9220:9220"
    restart: unless-stopped
    env_file:
      - ./workdir/.env
    environment:
      PGPASSWORD: ${DB_PASS_OCPP}
      PGPASSWORDAPI: ${DB_PASS_APIBOT}
      CLIENT_SECRET_SERVICE: ${OAUTH2_SECRET_SERVICE}
      CLIENT_SECRET_WEB: ${OAUTH2_SECRET_WEB}
      CLIENT_SECRET_ANDROID: ${OAUTH2_SECRET_ANDROID}
      CLIENT_SECRET_IOS: ${OAUTH2_SECRET_IOS}
      CLIENT_SECRET_OCPP: ${OAUTH2_SECRET_OCPP}
      PGSSLCERT: /tmp/postgresql.crt
      PGHOST: pgbouncer
      PGPORT: 6432
      PGUSER: ocpp
      PGHOSTAPI: postgres
      PGPORTAPI: 5432
      PGUSERAPI: apibot
      API_HOST: cloud.${DOMAIN:-localhost}
      OCPP_HOST: cs.${DOMAIN:-localhost}
    depends_on:
      - backend

  # ─── Frontend apps (built locally from cloned sources) ──────

  landing:
    build:
      context: ./workdir/frontend/landing
      dockerfile: .docker/Dockerfile
    container_name: landing
    networks:
      - lan-network
    env_file:
      - ./workdir/frontend/landing/src/.env
    healthcheck: *spa-healthcheck

  frontend:
    build:
      context: ./workdir/frontend/webapp
      dockerfile: Dockerfile
      args:
        # Next.js inlines NEXT_PUBLIC_* into the JS bundle at build time.
        # Values come from the brand's workdir/.env (populated by install.sh
        # from envs/<env>/.env.template + secrets provider).
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
        NEXT_PUBLIC_OAUTH_SCOPE: ${OAUTH_SCOPE}
        NEXT_PUBLIC_MAP_PROVIDER: ${MAP_PROVIDER:-stadia}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
        NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${YANDEX_MAPS_API_KEY}
        NEXT_PUBLIC_STADIA_API_KEY: ${STADIA_API_KEY}
        NEXT_PUBLIC_MAP_DEFAULT_CENTER: ${MAP_DEFAULT_CENTER:-4.35,50.85}
        NEXT_PUBLIC_PROJECT_NAME: ${NEXT_PUBLIC_PROJECT_NAME:-Apostol CSMS}
    container_name: frontend
    networks:
      - lan-network
    healthcheck: *spa-healthcheck

  driver:
    build:
      context: ./workdir/frontend
      dockerfile: driver/.docker/Dockerfile
    container_name: driver
    env_file:
      - ./workdir/frontend/driver/.env
    networks:
      - lan-network
    restart: unless-stopped
    healthcheck: *spa-healthcheck

  pay:
    build:
      context: ./workdir/frontend/pay
      dockerfile: .docker/Dockerfile
    container_name: pay
    env_file:
      - ./workdir/frontend/pay/.env
    networks:
      - lan-network
    healthcheck: *spa-healthcheck

  auth:
    # OAuth2 SPA — Vue 3 + Vite. Built locally from apostol-csms/auth
    # clone (install.sh clone_sources step) with brand-specific VITE_*
    # args baked into the bundle at build time.
    build:
      context: ./workdir/auth
      args:
        VITE_API_HOST: https://cloud.${DOMAIN:-localhost}
        VITE_CLIENT_ID: ${OAUTH_CLIENT_ID}
        VITE_SCOPE: ${OAUTH_SCOPE}
        VITE_APP_TITLE: ${PROJECT_DISPLAY_NAME:-Apostol CSMS}
        VITE_APP_LOGO: ${BRANDING_LOGO_URL:-/assets/logo.svg}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        VITE_DEFAULT_LOCALE: ${PROJECT_LOCALE:-en}
    container_name: auth
    networks:
      - lan-network
    restart: unless-stopped
    healthcheck: *spa-healthcheck

  # ─── Optional ───────────────────────────────────────────────

  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: stripe-cli
    networks:
      - lan-network
    command: ["listen", "--api-key", "${STRIPE_API_KEY}", "--device-name", "${PROJECT_NAME:-csms}-${BUILD_ENV:-dev}", "--skip-update", "--forward-to", "http://backend:4977/stripe/webhook"]
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - stripe

networks:
  wan-network:
  lan-network:
  db-network:

volumes:
  letsencrypt:
  postgresql:
  files:
  tmp:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=100m
